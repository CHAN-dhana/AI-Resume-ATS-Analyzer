<!DOCTYPE html>
<html>

<head>
    <title>ATS Resume Builder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

body{
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#0b1220,#111827,#0f172a);
    min-height: 100vh;
    color: #e5e7eb;
}

/* MAIN CARD */
.builder-card{
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 40px rgba(0,0,0,.35);
    color: #e5e7eb;
}

/* INPUTS */
.form-control, textarea, select{
    background: #1e293b;
    color: #ffffff;
    border: 1px solid #334155;
    border-radius: 12px;
}

.form-control::placeholder,
textarea::placeholder{
    color: rgba(255,255,255,0.6);
    font-size:13px;
}

label{
    font-weight:600;
    color:#e5e7eb;
}

/* SECTION TITLE */
.section-title{
    margin-top:30px;
    margin-bottom:15px;
    color:#ffffff;
    font-size:22px;
    font-weight:bold;
    border-left:5px solid #4f46e5;
    padding-left:12px;
}

/* BUTTONS */
.btn-primary{
    background: linear-gradient(135deg,#6366f1,#4f46e5);
    border:none;
}

.btn-success{
    background: linear-gradient(135deg,#10b981,#059669);
    border:none;
}

.btn-danger{
    background:#ef4444;
    border:none;
}

.btn-outline-primary{
    border:2px solid #4f46e5;
    color:#4f46e5;
}

.btn-outline-primary:hover{
    background:#4f46e5;
    color:white;
}

.btn{
    border-radius:12px;
    font-weight:600;
}

/* CARD EFFECT */
.card{
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
}


    </style>
</head>

<body>

<div class="container mt-5 mb-5">

<h2 class="text-center mb-5 fw-bold text-white">
📄 Create Professional ATS Friendly Resume
</h2>

<div class="card p-4 builder-card">

<form method="POST" id="resumeForm">
{% csrf_token %}

<!-- PERSONAL INFO -->
<h5 class="section-title">👤 Personal Information</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
{{form.name}}
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
{{form.email}}
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
{{form.phone}}
</div>

<div class="col-md-6 mb-3">
<label>GitHub</label>
{{form.github}}
</div>

<div class="col-md-6 mb-3">
<label>LinkedIn</label>
{{form.linkedin}}
</div>

</div>

<!-- OBJECTIVE -->
<textarea name="objective" class="form-control mb-3"
rows="3" placeholder="Career Objective"></textarea>

<!-- EDUCATION -->
<h5 class="section-title">🎓 Education</h5>

<div id="education-section">

<div class="education-item">

<select class="form-select mb-2 education-type"
        onchange="updateEducationFields(this)">

    <option value="">Select Education</option>

    <option value="masters">Master's</option>

    <option value="bachelors">Bachelor's</option>

    <option value="diploma">Diploma</option>

    <option value="pu">PU / Intermediate</option>

    <option value="school">School (10th)</option>

</select>

<input type="text" name="college_name[]" placeholder="Institution Name">

<input type="text" name="degree[]" placeholder="Degree / Stream">

<input type="text" name="year[]" placeholder="Year">

<input type="text" name="percentage[]" placeholder="CGPA / Percentage">
</div>

</div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addEducation()">
+ Add Education
</button>

<!-- SKILLS -->
<h5 class="section-title">🛠 Skills</h5>

<div id="skills-section">
    <input type="text" name="skills[]" class="form-control mb-2" placeholder="Skill">
</div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addSkill()">
+ Add Skill
</button>

<!-- EXPERIENCE -->
<h5 class="section-title">💼 Experience</h5>

<div id="experience-section">

    <div class="mb-2">
        <input type="text" name="company[]" class="form-control mb-2" placeholder="Company Name">
        <input type="text" name="role[]" class="form-control mb-2" placeholder="Role">
        <input type="text" name="duration[]" class="form-control mb-2" placeholder="Duration">
        <textarea name="experience_detail[]" class="form-control mb-2" placeholder="Work Description"></textarea>
    </div>

</div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addExperience()">
+ Add Experience
</button>

<!-- PROJECTS -->
<h5 class="section-title">🚀 Projects</h5>

<div id="project-section"></div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addProject()">
+ Add Project
</button>

<!-- CERTIFICATES -->
<h5 class="section-title">🏆 Certificates</h5>

<div id="certificate-section"></div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addCertificate()">
+ Add Certificate
</button>

<!-- ACHIEVEMENTS -->
<h5 class="section-title">⭐ Achievements</h5>

<div id="achievement-section"></div>

<button type="button" class="btn btn-outline-primary mb-3" onclick="addAchievement()">
+ Add Achievement
</button>

<!-- BUTTONS -->
<div class="row mt-4">

<div class="col-md-4">
<button type="submit" name="preview" class="btn btn-primary w-100">
Preview
</button>
</div>

<div class="col-md-4">
<button type="submit" name="download" class="btn btn-success w-100">
Download
</button>
</div>

<div class="col-md-4">
<button type="button" class="btn btn-danger w-100" onclick="resetForm()">
Reset
</button>
</div>

</div>

</form>

</div>
</div>

<script>

function addSkill(){
document.getElementById("skills-section").insertAdjacentHTML("beforeend",
`<div class="d-flex mb-2">
<input type="text" name="skills[]" class="form-control">
<button type="button" class="btn btn-danger ms-2" onclick="this.parentElement.remove()">X</button>
</div>`);
}

function addEducation(){

document.getElementById("education-section").insertAdjacentHTML("beforeend",`

<div class="education-item">

<select class="form-select mb-2 education-type"
onchange="updateEducationFields(this)">

<option value="">Select Education</option>
<option value="masters">Master's</option>
<option value="bachelors">Bachelor's</option>
<option value="diploma">Diploma</option>
<option value="pu">PU / Intermediate</option>
<option value="school">School (10th)</option>

</select>

<input type="text"
name="college_name[]"
class="form-control mb-2"
placeholder="Institution Name">

<input type="text"
name="degree[]"
class="form-control mb-2"
placeholder="Degree / Stream">

<input type="text"
name="year[]"
class="form-control mb-2"
placeholder="Year">

<input type="text"
name="percentage[]"
class="form-control mb-2"
placeholder="CGPA / Percentage">

<button type="button"
class="btn btn-danger"
onclick="this.parentElement.remove()">
Remove
</button>

</div>

`);

}
function addExperience(){
document.getElementById("experience-section").insertAdjacentHTML("beforeend",
`<div class="mb-2">
<input type="text" name="company[]" class="form-control mb-2">
<input type="text" name="role[]" class="form-control mb-2">
<input type="text" name="duration[]" class="form-control mb-2">
<textarea name="experience_detail[]" class="form-control mb-2"></textarea>
<button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">Remove</button>
</div>`);
}

function addProject(){
document.getElementById("project-section").insertAdjacentHTML("beforeend",
`<div class="mb-2 p-2 border rounded">

<input type="text" name="project_name[]" class="form-control mb-2"
placeholder="Project Name">

<textarea name="project_detail[]" class="form-control mb-2" rows="2"
placeholder="Project Description"></textarea>

<input type="text" name="project_link[]" class="form-control mb-2"
placeholder="Project Link (Optional)">

<button type="button" class="btn btn-danger"
onclick="this.parentElement.remove()">Remove</button>

</div>`);
}
function addCertificate(){
document.getElementById("certificate-section").insertAdjacentHTML("beforeend",
`<div class="d-flex mb-2">
<input type="text" name="certificates[]" class="form-control">
<button type="button" class="btn btn-danger ms-2" onclick="this.parentElement.remove()">X</button>
</div>`);
}

function addAchievement(){
document.getElementById("achievement-section").insertAdjacentHTML("beforeend",
`<div class="d-flex mb-2">
<input type="text" name="achievements[]" class="form-control">
<button type="button" class="btn btn-danger ms-2" onclick="this.parentElement.remove()">X</button>
</div>`);
}

function resetForm(){
document.getElementById("resumeForm").reset();
location.reload();
}
function updateEducationFields(select){

const box = select.parentElement;

const college = box.querySelector('input[name="college_name[]"]');
const degree = box.querySelector('input[name="degree[]"]');
const year = box.querySelector('input[name="year[]"]');
const cgpa = box.querySelector('input[name="percentage[]"]');

degree.style.display="";

switch(select.value){

case "masters":
    college.placeholder = "College Name";
    degree.placeholder = "Degree / Specialization";
    year.placeholder = "Duration (Month YYYY - Month YYYY)";
    cgpa.placeholder = "CGPA";
    degree.style.display = "";
    break;

case "bachelors":
    college.placeholder = "College Name";
    degree.placeholder = "Degree / Branch";
    year.placeholder = "Duration (Month YYYY - Month YYYY)";
    cgpa.placeholder = "CGPA";
    degree.style.display = "";
    break;
    
case "diploma":
    college.placeholder = "Institute Name";
    degree.placeholder = "Course / Stream";
    year.placeholder = "Passing Year";
    cgpa.placeholder = "CGPA / Percentage";
    degree.style.display = "";
    break;

case "pu":
    college.placeholder = "College Name";
    degree.placeholder = "Course / Stream";
    year.placeholder = "Passing Year";
    cgpa.placeholder = "CGPA / Percentage";
    degree.style.display = "";
    break;

case "school":
    college.placeholder = "School Name";
    year.placeholder = "Passing Year";
    cgpa.placeholder = "CGPA / Percentage";
    degree.style.display = "none";
    break;

default:
    college.placeholder = "Institution Name";
    degree.placeholder = "Degree / Stream";
    year.placeholder = "Year";
    cgpa.placeholder = "CGPA / Percentage";
    degree.style.display = "";
}

}

</script>


</body>
</html>
